name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Cross-compile
        run: |
          mkdir -p dist
          LDFLAGS="-X main.Version=${VERSION} -s -w"

          # observe CLI
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/observe-linux-amd64        ./cmd/observe
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/observe-linux-arm64        ./cmd/observe
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/observe-darwin-amd64       ./cmd/observe
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/observe-darwin-arm64       ./cmd/observe
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/observe-windows-amd64.exe  ./cmd/observe

          # observer-server
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/observer-server-linux-amd64        ./cmd/server
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/observer-server-linux-arm64        ./cmd/server
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/observer-server-darwin-amd64       ./cmd/server
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/observer-server-darwin-arm64       ./cmd/server
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/observer-server-windows-amd64.exe  ./cmd/server

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/observe-*
            dist/observer-server-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
