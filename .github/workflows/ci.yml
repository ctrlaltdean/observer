name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # release workflow handles tags
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build all packages
        run: go build ./...

      - name: Run tests
        run: go test ./...
